<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traductor ES → EN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 6px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      padding: 8px 16px;
      border-radius: 999px;
      margin-bottom: 32px;
      background: #1e2130;
      border: 1px solid #2d3148;
      transition: all 0.3s;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 1.4s ease-in-out infinite;
    }

    #status-dot.ready { background: #10b981; animation: none; }
    #status-dot.error { background: #ef4444; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
      max-width: 960px;
    }

    @media (max-width: 680px) {
      .workspace { grid-template-columns: 1fr; }
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    .lang-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .lang-es { background: #1e3a5f; color: #60a5fa; }
    .lang-en { background: #1a3a2a; color: #34d399; }

    textarea {
      width: 100%;
      min-height: 260px;
      resize: vertical;
      padding: 16px;
      font-size: 1rem;
      line-height: 1.6;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea:focus { border-color: #6366f1; }
    textarea::placeholder { color: #3d4466; }

    .output-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #output {
      min-height: 260px;
      padding: 16px;
      font-size: 1rem;
      line-height: 1.6;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 12px;
      color: #e2e8f0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #output.loading {
      color: #3d4466;
      font-style: italic;
    }

    #output.empty { color: #3d4466; }

    .copy-btn {
      align-self: flex-end;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #6366f1;
      color: #fff;
      transition: background 0.2s, transform 0.1s;
    }

    .copy-btn:hover { background: #4f52d3; }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn:disabled { background: #2d3148; color: #4a5568; cursor: default; }
    .copy-btn.copied { background: #10b981; }

    .copy-btn svg { flex-shrink: 0; }

    .translate-row {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
    }

    .translate-btn {
      padding: 12px 40px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    .translate-btn:hover { opacity: 0.88; }
    .translate-btn:active { transform: scale(0.97); }
    .translate-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>

<header>
  <h1>Traductor ES → EN</h1>
  <p>Traducción local · sin internet · 100% privado</p>
</header>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Cargando modelo…</span>
</div>

<div class="workspace">
  <div class="panel">
    <div class="panel-label">
      <span class="lang-badge lang-es">ES</span>
      Texto en español
    </div>
    <textarea id="input" placeholder="Escribí o pegá el texto en español acá…" spellcheck="false"></textarea>
  </div>

  <div class="panel output-wrapper">
    <div class="panel-label">
      <span class="lang-badge lang-en">EN</span>
      Traducción al inglés
    </div>
    <div id="output" class="empty">La traducción aparecerá aquí…</div>
    <button class="copy-btn" id="copy-btn" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
      Copiar traducción
    </button>
  </div>

  <div class="translate-row">
    <button class="translate-btn" id="translate-btn" disabled>Traducir</button>
  </div>
</div>

<script>
  const inputEl    = document.getElementById('input');
  const outputEl   = document.getElementById('output');
  const copyBtn    = document.getElementById('copy-btn');
  const translateBtn = document.getElementById('translate-btn');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  let modelReady = false;

  async function checkStatus() {
    try {
      const res = await fetch('/status');
      const data = await res.json();
      if (data.ready) {
        modelReady = true;
        statusDot.className = 'ready';
        statusText.textContent = 'Modelo listo · modo offline';
        translateBtn.disabled = false;
      } else if (data.error) {
        statusDot.className = 'error';
        statusText.textContent = 'Error al cargar el modelo: ' + data.error;
      } else {
        setTimeout(checkStatus, 1500);
      }
    } catch {
      setTimeout(checkStatus, 2000);
    }
  }

  checkStatus();

  async function translate() {
    const text = inputEl.value.trim();
    if (!text) return;

    translateBtn.disabled = true;
    outputEl.textContent = 'Traduciendo…';
    outputEl.className = 'loading';
    copyBtn.disabled = true;

    try {
      const res = await fetch('/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();

      if (data.error) {
        outputEl.textContent = '⚠️ ' + data.error;
        outputEl.className = '';
      } else {
        outputEl.textContent = data.translation || '';
        outputEl.className = data.translation ? '' : 'empty';
        copyBtn.disabled = !data.translation;
      }
    } catch (err) {
      outputEl.textContent = '⚠️ Error de conexión con el servidor.';
      outputEl.className = '';
    } finally {
      translateBtn.disabled = !modelReady;
    }
  }

  translateBtn.addEventListener('click', translate);

  inputEl.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') translate();
  });

  copyBtn.addEventListener('click', async () => {
    const text = outputEl.textContent;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✓ Copiado';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = `
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copiar traducción`;
      }, 2000);
    } catch {
      alert('No se pudo copiar. Seleccioná el texto manualmente.');
    }
  });
</script>
</body>
</html>
